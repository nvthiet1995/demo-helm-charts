{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1alpha1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: demo-store
    kind: SecretStore
  target:
    name: {{ .Release.Name }}-secret
  data:
    - secretKey: password
      remoteRef:
        key: {{ .Values.externalSecret.key }}
{{- end }}
