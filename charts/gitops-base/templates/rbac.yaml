apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secretstore-role
  namespace: demo
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get","list","watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: secretstore-binding
  namespace: demo
subjects:
- kind: ServiceAccount
  name: secretstore-sa
  namespace: demo
roleRef:
  kind: Role
  name: secretstore-role
  apiGroup: rbac.authorization.k8s.io